        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        /* --- 全体設定 --- */
        .font-bold { font-weight: 400 !important; }
        .text-sm { font-size: 1.2rem !important; line-height: 2rem !important; }

        .text-input-small { font-size: 1.02rem !important; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #FFF8F0; 
            color: #4E2600; 
            padding-top: 70px; 
            padding-bottom: 120px; 
        }
        
        .ad-banner {
            position: fixed; left: 0; right: 0; z-index: 50;
            background-color: #FFE0B2; color: #E65100;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; border: 1px dashed #FFCC80;
        }
        .ad-top { top: 0; height: 60px; border-bottom-width: 1px; }
        .ad-bottom { bottom: 0; height: 60px; border-top-width: 1px; }

        .timeline-container { position: relative; padding-left: 20px; }
        .timeline-line { 
            position: absolute; left: 11px; top: 24px; bottom: -10px; 
            width: 2px; background-color: #FFD180; z-index: 0; 
        }
        .timeline-item:last-child .timeline-line { display: none; }
        
        .timeline-dot { 
            width: 24px; height: 24px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 10px; z-index: 10; background-color: #fff; border: 2px solid #FFB74D;
            flex-shrink: 0; margin-right: 12px; position: relative;
        }
        
        .input-hole {
            display: inline-block; border-bottom: 2px dashed #F57C00; color: #f97316;
            padding: 0 4px; cursor: pointer; transition: all 0.2s; font-weight: bold;
            min-width: 60px; text-align: center;
        }
        .input-hole.filled { border-bottom: none; color: #4E2600; pointer-events: auto; text-align: left; min-width: auto; } 
        .filled-orange { color: #f97316 !important; }

        .input-readonly { color: #4E2600; border-bottom: none; pointer-events: none; }
        .select-box {
            display: inline-flex; align-items: center; justify-content: center;
            border: 1px solid #FFB74D; background-color: #fff;
            padding: 2px 8px; border-radius: 4px; cursor: pointer;
            font-size: 0.75rem; color: #F57C00;
        }
        .toll-tag { font-size: 70%; vertical-align: baseline; margin-left: 2px; margin-right: 2px; color: #F57C00; }
        .modal-bg { background-color: rgba(78, 38, 0, 0.5); }

        .icon-svg { display: inline-block; vertical-align: middle; height: 1.0em; width: auto; }
        .icon-svg-large { height: 1.5em; }

        .btn-map-stop {
            color: #F57C00;
            margin-left: 6px;
            display: inline-flex;
            align-items: center;
            vertical-align: middle;
            transition: opacity 0.2s;
        }
        .btn-map-stop svg { width: 1.3rem; height: 1.3rem; fill: currentColor; }

        .btn-nav-move {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            padding: 2px 8px;
            color: #F57C00;
            border: 1px solid #FFCC80;
            background-color: #FFF3E0;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: bold;
            text-decoration: none;
            transition: opacity 0.2s;
            margin-left: 8px;
            vertical-align: middle;
        }
        .btn-nav-move svg { width: 14px; height: 14px; fill: #F57C00; }
        .btn-nav-move:hover, .btn-map-stop:hover { opacity: 0.7; }

        @media print {
            .no-print, .ad-banner, header { display: none !important; }
            body { background-color: #fff !important; padding: 0 !important; margin: 0 !important; width: 100%; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            #app-content { padding: 0 !important; max-width: none !important; }
            .shadow-xl, .shadow-lg, .shadow-sm { box-shadow: none !important; border: none !important; }
            .bg-gradient-to-r { background: #F57C00 !important; color: white !important; }
            .timeline-item, .card { break-inside: avoid; page-break-inside: avoid; }
            #full-map-area { height: 300px !important; width: 100% !important; border: 1px solid #FFB74D !important; break-inside: avoid; }
        }
    
        .timeline-line{display:none !important;}
        .timeline, .timeline-container{padding-left:0 !important;}

        .place-name{word-break:break-all;max-width:15em;}
        @media (max-width:768px){.place-name{max-width:9em;}}

                                </div>`;
                        } else {
                            if (item.stayReason || item.stayTime > 0 || item.memo) {
                                stayHtml = `<div class="flex gap-2 mt-1"><div class="w-10 flex-shrink-0 text-center">${(isStart||isLast)?'★':SVG_STAY}</div><div><div class="text-sm font-bold" style="color:#f97316;">${item.stayReason} ${item.stayTime > 0 ? `<span class="text-orange-500 font-normal ml-2">滞在 ${item.stayTime}分</span>` : ''}</div>${item.memo ? `<div class="text-xs text-orange-400 mt-0.5 flex items-center gap-1">${SVG_MEMO} ${item.memo}</div>` : ''}</div></div>`;
                            }
                        }
                        if (stayHtml) html += `<div class="timeline-item timeline-container pb-2"><div class="timeline-line"></div><div class="pl-[36px]">${stayHtml}</div></div>`;

                        if (!isLast && !isStart) {
                            const depTime = item.depTimeStr || '00:00'; 
                            html += `<div class="timeline-item timeline-container pb-3 min-h-[30px]"><div class="timeline-line"></div><div class="flex items-center w-full"><div class="timeline-dot border-orange-300 text-orange-300">●</div><div class="w-16 text-right font-bold text-sm flex-shrink-0 mr-3" style="color:#f97316;">${depTime}</div><div class="flex-grow text-sm"><span class="${isEdit?'text-orange-300':'font-bold'}" style="${isEdit?'':'color:#f97316;'}">${item.name||'地点名'}</span> <span class="font-bold text-orange-500">出発</span></div></div></div>`;
                        }
                    }
                } else if (item.type === 'MOVE') {
                    if (item.mode === 'WAIT') return;
                    const mKey = item.mode; 
                    const modeLabels = { 'DRIVING_FREE':'車', 'DRIVING_TOLL':'車', 'WALKING':'徒歩', 'BICYCLING':'自転車' };
                    const iconMap = { 'DRIVING_FREE': SVG_CAR_FREE, 'DRIVING_TOLL': SVG_CAR_TOLL, 'WALKING': SVG_WALK, 'BICYCLING': SVG_BIKE };
                    const icon = iconMap[mKey] || SVG_CAR_FREE;
                    const dur = item.duration ? `${item.duration}分` : '00分';
                    const isToll = (mKey === 'DRIVING_TOLL');
                    
                    let moveContent = '';
                    if (isEdit) {
                        moveContent = `
                        <div class="flex items-center gap-2 text-sm">
                            <span onclick="openTransportModal(${i})" class="select-box">${icon} ${modeLabels[mKey]} ${isToll?'(有料)':''} ▼</span>
                            <span class="text-orange-400">移動 ${dur} ${item.trafficBuffer > 0 ? `<span class="text-[10px] text-orange-500 font-bold ml-1">+${item.trafficBuffer}m</span>` : ''}</span>
                        </div>`;
                    } else {
                        const startLoc = plan.stops[i-1].location || plan.stops[i-1].name;
                        const endLoc = plan.stops[i+1].location || plan.stops[i+1].name;
                        let gMode = (item.mode === 'WALKING') ? 'walking' : (item.mode === 'BICYCLING' ? 'bicycling' : 'driving');
                        const navUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(startLoc)}&destination=${encodeURIComponent(endLoc)}&travelmode=${gMode}`;

                        moveContent = `
                        <div>
                            <div class="text-sm font-bold text-orange-500 flex items-center mb-1">
                                ${icon} ${modeLabels[mKey]}${isToll?'<span class="toll-tag">(有料)</span>':''}移動 
                                <span class="font-normal ml-1" style="color:#f97316;">${dur}</span>
                                <a href="${navUrl}" target="_blank" class="no-print btn-nav-move" title="ナビを開始">${SVG_NAV_ARROW}<span>ナビ</span></a>
                            </div>
                            <div class="text-xs text-orange-400 leading-relaxed min-w-0 break-words font-bold">
                                ${isToll && item.roads && item.roads.length > 0 ? '<div>有料区間あり</div>' : ''}
                            </div>
                        </div>`;
                    }
                    html += `<div class="timeline-item timeline-container pb-4"><div class="timeline-line"></div><div class="pl-[36px]">${moveContent}</div></div>`;
                }
            });
            html += `</div></div>`; 
            html += mapContainerHtml; 

            let footer = isSample ? `<div class="mt-8 text-center pb-8 no-print"><button onclick="copySampleToEdit()" class="w-full py-4 bg-gradient-to-r from-orange-500 to-orange-600 text-white text-xl font-extrabold rounded-2xl shadow-xl hover:scale-105 transition">✨ 新しくマイ「旅のしおり」をつくる</button></div>` : (isEdit ? `
                <div class="mt-8 space-y-4 text-center pb-8 no-print">
                    <button onclick="addNextStop()" class="w-full py-3 border-2 border-dashed border-orange-200 text-orange-300 font-bold rounded-xl">+ 地点を追加</button>
                    <button onclick="openFinalizeModal()" class="w-full py-4 bg-gradient-to-r from-orange-600 to-orange-700 text-white text-xl font-extrabold rounded-2xl shadow-xl">✨ 旅のしおりをつくる</button>
                </div>` : `
                <div class="mt-8 no-print space-y-4 pb-8"><div class="flex gap-2">
                    <button onclick="mode='EDIT'; renderTimeline();" class="flex-1 bg-orange-100 text-orange-700 font-bold py-3 rounded-xl">修正する</button>
                    <button onclick="triggerPrint()" class="flex-1 bg-orange-600 text-white font-bold py-3 rounded-xl shadow-lg">📄 PDF / 印刷</button>
                    <button onclick="saveCurrentPlan()" class="flex-1 bg-orange-600 text-white font-bold py-3 rounded-xl">保存する</button>
                </div></div>`);

            document.getElementById('app-content').innerHTML = html + footer;
            if(!isEdit) setTimeout(initFullMap, 800); 
        }

        function toggleCustomSelect() {
            const options = document.getElementById('custom-options');
            options.classList.toggle('hidden');
        }

        function selectOption(value, label, element) {
            document.getElementById('input-transport').value = value;
            const iconHtml = element.querySelector('span').innerHTML;
            document.getElementById('selected-display').innerHTML = `
                <span class="w-8 h-5 flex items-center">${iconHtml}</span>
                <span>${label}</span>
            `;
            document.getElementById('custom-options').classList.add('hidden');
        }

        window.addEventListener('click', function(e) {
            const trigger = document.getElementById('custom-select-trigger');
            const options = document.getElementById('custom-options');
            if (trigger && !trigger.contains(e.target) && !options.contains(e.target)) {
                options.classList.add('hidden');
            }
        });

        function showSample() { editingPlan = getSampleData(); mode = 'SAMPLE'; renderTimeline(); }
        function copySampleToEdit() {
            const sample = getSampleData();
            editingPlan = { 
                id: 'plan_' + Date.now(), 
                name: '新規旅程プラン', 
                baseTime: sample.baseTime, 
                rounding: 0, 
                gatheringMinutes: 0,
                stops: sample.stops.map(s => { 
                    if (s.type === 'MOVE') return { ...s, duration: 0, roads:[], trafficBuffer: 0 }; 
                    return { ...s, name:'', location:'', confirmed:false, timeStr:'00:00', depTimeStr:'00:00' }; 
                }) 
            };
            editingPlan.stops[0].name = '（出発地と同じ）'; mode = 'EDIT'; renderTimeline();
        }
        function startNewEdit() { copySampleToEdit(); }
        function addNextStop() { editingPlan.stops.push({ type:'MOVE', mode:'DRIVING_FREE', duration:0, trafficBuffer:0 }); editingPlan.stops.push({ type:'STOP', name:'', location:'', confirmed:false, stayTime:20, stayReason:'', memo:'', isBase:false, timeStr:'00:00' }); renderTimeline(); }
        function deleteStop(idx) { if(idx <= 2 || idx === editingPlan.stops.length-1) { alert('この地点は削除できません'); return; } editingPlan.stops.splice(idx-1, 2); renderTimeline(); }
        function moveStop(idx, dir) { const moveIdx = idx - 1; if (dir === -1) { if (moveIdx <= 2) return; const selfSet = editingPlan.stops.splice(moveIdx, 2); editingPlan.stops.splice(moveIdx - 2, 0, ...selfSet); } else { if (idx >= editingPlan.stops.length - 2) return; const selfSet = editingPlan.stops.splice(moveIdx, 2); editingPlan.stops.splice(moveIdx + 2, 0, ...selfSet); } renderTimeline(); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function openLocationModal(idx) { editingIndex = idx; const item = editingPlan.stops[idx]; document.getElementById('input-loc-name').value = item.name; document.getElementById('loc-search-res').textContent = item.confirmed ? `※確定済: ${item.location}` : '※確定を押して住所を確認してください'; tempLocationData = item.confirmed ? item.location : null; openModal('modal-location'); }
        function validateLocation() { const val = document.getElementById('input-loc-name').value; if(!val) return; new google.maps.places.AutocompleteService().getPlacePredictions({ input: val }, (preds, status) => { const el = document.getElementById('loc-search-res'); if (status === 'OK' && preds.length > 0) { tempLocationData = preds[0].description; el.innerHTML = `<span class="text-orange-600">✅ OK: ${tempLocationData}</span>`; } else { tempLocationData = null; el.innerHTML = `<span class="text-orange-300">❌ 見つかりません</span>`; } }); }
        function saveToDictionary() { const val = document.getElementById('input-loc-name').value; if(val && !savedLocations.includes(val)) { savedLocations.push(val); localStorage.setItem('savedLocations_v2', JSON.stringify(savedLocations)); updateDatalist(); alert('辞書に保存しました'); } }
        function confirmLocation() { if(!tempLocationData) { alert('確定を行ってください'); return; } const item = editingPlan.stops[editingIndex]; item.name = document.getElementById('input-loc-name').value; item.location = tempLocationData; item.confirmed = true; if (editingIndex === 2) { editingPlan.stops[0].name = item.name; editingPlan.stops[0].location = item.location; editingPlan.stops[0].confirmed = true; } closeModal('modal-location'); renderTimeline(); }
        function openTransportModal(idx) { editingIndex = idx; const item = editingPlan.stops[idx]; document.getElementById('input-transport').value = item.mode; document.getElementById('input-traffic-buffer').value = item.trafficBuffer || 0; openModal('modal-transport'); }
        function confirmTransport() { const item = editingPlan.stops[editingIndex]; item.mode = document.getElementById('input-transport').value; item.trafficBuffer = parseInt(document.getElementById('input-traffic-buffer').value); closeModal('modal-transport'); renderTimeline(); }
        
        function confirmGathering() {
            editingPlan.gatheringMinutes = parseInt(document.getElementById('input-gathering-minutes').value);
            closeModal('modal-gathering');
            renderTimeline();
        }

        function confirmRounding(val) {
            editingPlan.rounding = val;
            closeModal('modal-rounding');
            renderTimeline();
        }

        function openStayModal(idx) { 
            editingIndex = idx; 
            const item = editingPlan.stops[idx]; 
            const isStart = (idx === 2);
            const isLast = (idx === editingPlan.stops.length - 1);
            
            const inputsGroup = document.getElementById('stay-inputs-group');
            const titleText = document.getElementById('stay-modal-title-text');
            const iconTitle = document.getElementById('icon-stay-title');

            if (isStart || isLast) {
                inputsGroup.style.display = 'none';
                titleText.textContent = '基点設定（出発・到着）';
                iconTitle.innerHTML = '★';
            } else {
                inputsGroup.style.display = 'block';
                titleText.textContent = '滞在・基点設定';
                iconTitle.innerHTML = SVG_STAY;
            }

            document.getElementById('input-stay-reason').value = item.stayReason; 
            document.getElementById('input-stay-time').value = item.stayTime; 
            document.getElementById('input-is-base').checked = item.isBase; 
            document.getElementById('input-base-clock').value = item.baseClock || "12:00";
            openModal('modal-stay'); 
        }
        
        function confirmStay() { 
            const idx = editingIndex;
            const item = editingPlan.stops[idx]; 
            const isStart = (idx === 2);
            const isLast = (idx === editingPlan.stops.length - 1);

            if (isStart || isLast) {
                item.stayReason = "";
                item.stayTime = 0;
            } else {
                item.stayReason = document.getElementById('input-stay-reason').value; 
                item.stayTime = parseInt(document.getElementById('input-stay-time').value); 
            }

            if(document.getElementById('input-is-base').checked) { 
                editingPlan.stops.forEach(s => { if(s.type==='STOP') s.isBase = false; }); 
                item.isBase = true; 
                item.baseClock = document.getElementById('input-base-clock').value; 
            } else { 
                item.isBase = false; 
            } 
            closeModal('modal-stay'); 
            renderTimeline(); 
        }

        function openMemoModal(idx) { editingIndex = idx; document.getElementById('input-memo').value = editingPlan.stops[idx].memo; openModal('modal-memo'); }
        function confirmMemo() { editingPlan.stops[editingIndex].memo = document.getElementById('input-memo').value; closeModal('modal-memo'); renderTimeline(); }
        
        function openFinalizeModal() { 
            if(editingPlan.stops.filter(s => s.type==='STOP' && !s.confirmed && s.name !== '（出発地と同じ）').length > 0) { alert('未確定の地点があります'); return; } 
            if(!editingPlan.stops.some(s => s.type==='STOP' && s.isBase)) { alert('時間の基点（★）が設定されていません'); return; } 
            const d = new Date(); d.setDate(d.getDate()+1);
            document.getElementById('final-base-date').value = d.toISOString().split('T')[0];
            openModal('modal-finalize'); 
        }

        async function executeCalculation() {
            editingPlan.name = document.getElementById('final-plan-name').value; 
            editingPlan.baseTime = document.getElementById('final-base-date').value + "T12:00"; 
            closeModal('modal-finalize');
            document.getElementById('app-content').innerHTML = '<div class="text-center p-20"><div class="text-3xl animate-bounce">🚗</div><div class="mt-4 font-bold text-orange-400">ルート計算中...</div></div>';
            const ds = new google.maps.DirectionsService();
            for(let i=0; i<editingPlan.stops.length; i++) {
                const item = editingPlan.stops[i];
                if (item.type === 'MOVE') {
                    if (item.mode === 'WAIT') continue;
                    const start = editingPlan.stops[i-1].location; const end = editingPlan.stops[i+1].location;
                    let gMode = (item.mode === 'WALKING') ? 'WALKING' : (item.mode === 'BICYCLING' ? 'BICYCLING' : 'DRIVING');
                    try {
                        const res = await new Promise(resolve => ds.route({ origin: start, destination: end, travelMode: gMode, avoidTolls: (item.mode === 'DRIVING_FREE') }, (r, s) => resolve(s==='OK'?r:null)));
                        if (res) {
                            const leg = res.routes[0].legs[0]; item.duration = Math.ceil(leg.duration.value / 60) + (item.trafficBuffer || 0);
                            let roads = []; if (gMode === 'DRIVING' && item.mode === 'DRIVING_TOLL') { leg.steps.forEach(s => { const clean = s.instructions.replace(/<[^>]*>/g, ' ').replace(/[（(].*?[)）]/g, '').trim(); if (clean.match(/(高速|自動車道|スカイライン|有料道路|ライン|京葉道路|アクアライン)/)) roads.push(clean); }); item.roads = [...new Set(roads)]; }
                        }
                    } catch(e) {}
                }
            }
            calculateSchedule(); mode = 'RESULT'; renderTimeline();
        }

        function calculateSchedule() {
            const stops = editingPlan.stops; 
            const baseIdx = stops.findIndex(s => s.type==='STOP' && s.isBase); 
            const step = editingPlan.rounding || 0;
            const addMin = (d, m) => new Date(d.getTime() + m*60000); 
            const roundUp = (d) => {
                if (step <= 1) return d;
                const ms = step * 60 * 1000;
                return new Date(Math.ceil(d.getTime() / ms) * ms);
            };
            const fmt = (d) => `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
            
            let baseDateStr = editingPlan.baseTime.split('T')[0]; 
            let baseClockStr = stops[baseIdx].baseClock || "12:00"; 
            let t = new Date(`${baseDateStr}T${baseClockStr}`);
            
            stops[baseIdx].arrTime = t; 
            stops[baseIdx].depTime = roundUp(addMin(t, stops[baseIdx].stayTime));
            
            for(let i=baseIdx+1; i<stops.length; i++) { 
                if(stops[i].type === 'STOP') { 
                    stops[i].arrTime = roundUp(addMin(stops[i-2].depTime, stops[i-1].duration || 0)); 
                    stops[i].depTime = roundUp(addMin(stops[i].arrTime, stops[i].stayTime)); 
                } 
            }
            
            for(let i=baseIdx-1; i>=0; i--) { 
                if(stops[i].type === 'STOP') { 
                    stops[i].depTime = (stops[i+1].mode === 'WAIT') ? stops[i+2].arrTime : addMin(stops[i+2].arrTime, -(stops[i+1].duration||0)); 
                    stops[i].depTime = roundUp(stops[i].depTime);
                    stops[i].arrTime = roundUp(addMin(stops[i].depTime, -stops[i].stayTime)); 
                } 
            }
            
            const gatheringMins = editingPlan.gatheringMinutes || 0;
            if (stops[0] && stops[2]) {
                stops[0].arrTime = roundUp(addMin(stops[2].arrTime, -gatheringMins));
            }

            stops.forEach(s => { if(s.type==='STOP') { s.timeStr = fmt(s.arrTime); s.depTimeStr = fmt(s.depTime); } });
        }

        function initFullMap() {
            const div = document.getElementById('full-map-area'); if(!div) return;
            const map = new google.maps.Map(div, {zoom: 9, center: {lat:35.681, lng:139.767}, disableDefaultUI: true});
            const renderer = new google.maps.DirectionsRenderer({ map: map, suppressMarkers: false, polylineOptions:{strokeColor:'#F57C00', strokeWeight:4} });
            const pts = editingPlan.stops.slice(2).filter(s => s.type === 'STOP').map(s => ({ location: s.location, stopover: true }));
            if(pts.length < 2) return;
            new google.maps.DirectionsService().route({ origin: pts[0].location, destination: pts[pts.length-1].location, waypoints: pts.slice(1, pts.length-1), travelMode: 'DRIVING' }, (res, status) => { if(status==='OK') renderer.setDirections(res); });
        }
        function updateDatalist() { const l=document.getElementById('saved-locations-list'); if(l) l.innerHTML=savedLocations.map(x=>`<option value="${x}">`).join(''); }
        function goHome() { if(mode==='EDIT' && !confirm('破棄しますか？')) return; renderDashboard(); }
        function saveCurrentPlan() { editingPlan.updatedAt = new Date().toISOString(); const idx = savedPlans.findIndex(p => p.id === editingPlan.id); if(idx >= 0) savedPlans[idx] = editingPlan; else savedPlans.unshift(editingPlan); localStorage.setItem('savedPlans_v2', JSON.stringify(savedPlans)); alert('保存しました'); renderDashboard(); }
        function deletePlan(i) { if(!confirm('削除しますか？')) return; savedPlans.splice(i, 1); localStorage.setItem('savedPlans_v2', JSON.stringify(savedPlans)); renderDashboard(); }
        function openPlan(i) { editingPlan = savedPlans[i]; mode = 'RESULT'; renderTimeline(); }
        function checkUrlImport() { const p = new URLSearchParams(location.search); const d = p.get('d'); if(d) { try { const json = LZString.decompressFromEncodedURIComponent(d); if(json) { const plan = JSON.parse(json); plan.id = 'import_'+Date.now(); savedPlans.unshift(plan); localStorage.setItem('savedPlans_v2', JSON.stringify(savedPlans)); history.replaceState(null, '', location.pathname); } } catch(e){} } }
        function sharePlan(i) { const plan = savedPlans[i]; const cleanPlan = JSON.parse(JSON.stringify(plan)); cleanPlan.stops.forEach(s => { delete s.arrTime; delete s.depTime; }); const compressed = LZString.compressToEncodedURIComponent(JSON.stringify(cleanPlan)); const url = `${location.origin}${location.pathname}?d=${compressed}`; if(navigator.clipboard) navigator.clipboard.writeText(url).then(()=>alert('共有URLをコピーしました')); else prompt('URLをコピー:', url); }
    </script>
</body>
